<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mondrian Layout</title>
<style>
  body {
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .canvas {
    width: 500px;
    height: 700px;
    display: grid;
    grid-template-columns: 20px 2fr 1fr 2fr 1fr;
    grid-template-rows: 1fr 2fr 1fr 2fr 1fr 1fr;
    gap: 10px;
    background: black;
    padding: 10px;
  }

  .box { background: #f9f6ef; }

  .red { background: #e6392f; }
  .blue { background: #4ea3d8; }
  .yellow { background: #f1e05a; }
  .black { background: #111; }

  /* Layout */
  .b1 { grid-column: 2 / 4; grid-row: 1; }       /* red top */
  .b2 { grid-column: 4; grid-row: 1; }           /* white */
  .b3 { grid-column: 5; grid-row: 1 / 3; }       /* yellow tall */
  .b4 { grid-column: 2; grid-row: 2 / 4; }       /* blue tall */
  .b5 { grid-column: 3; grid-row: 2 / 4; }       /* black */
  .b6 { grid-column: 4; grid-row: 3; }           /* white */
  .b7 { grid-column: 2; grid-row: 4 / 6; }       /* big white */
  .b8 { grid-column: 3; grid-row: 4; }           /* small red */
  .b9 { grid-column: 4; grid-row: 4; }           /* red */
  .b10 { grid-column: 3 / 5; grid-row: 5; }      /* blue */
  .b11 { grid-column: 5; grid-row: 5; }          /* white */
  .b12 { grid-column: 5; grid-row: 6; }          /* white */
  .b13 { grid-column: 2 / 5; grid-row: 6; }      /* yellow bottom */
</style>
</head>

<body>
  <div class="canvas">
    <div class="box red b1"></div>
    <div class="box b2"></div>
    <div class="box yellow b3"></div>
    <div class="box blue b4"></div>
    <div class="box black b5"></div>
    <div class="box b6"></div>
    <div class="box b7"></div>
    <div class="box red b8"></div>
    <div class="box red b9"></div>
    <div class="box blue b10"></div>
    <div class="box b11"></div>
    <div class="box b12"></div>
    <div class="box yellow b13"></div>
  </div>
</body>
</html>
